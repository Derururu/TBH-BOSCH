<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPR Action Required Section</title>
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibe: Light, minimalist, sleek */
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85); /* Frosted glass white */
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            /* Soft accent color (Warm Coral) */
            --primary-accent: #f87171; 
            --primary-accent-hover: #ef4444;
            --primary-accent-shadow: rgba(248, 113, 113, 0.35);
            
            /* Secondary button styles */
            --secondary-border: #cbd5e1;
            --secondary-hover-bg: #f1f5f9;
            
            /* Layout & Shadows */
            --card-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -1px rgba(15, 23, 42, 0.03);
            --card-blur: 16px;
            
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            /* Subtle background texture for the dashboard behind */
            background-image: radial-gradient(circle at 15% 50%, #e2e8f0, transparent 25%),
                              radial-gradient(circle at 85% 30%, #f1f5f9, transparent 25%);
        }

        /* Mock Dashboard Elements */
        .dashboard {
            padding: 3rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* --- GDPR Section (Inline Dashboard Widget) --- */
        .gdpr-section {
            background: var(--card-bg);
            backdrop-filter: blur(var(--card-blur));
            -webkit-backdrop-filter: blur(var(--card-blur));
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            width: 100%;
            margin: 0 0 2rem 0;
            padding: 1.5rem 2rem;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: opacity 0.4s ease;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .gdpr-section {
                flex-direction: column;
                align-items: flex-start;
                padding: 1.5rem;
            }
        }

        /* Soft Icon/Graphic Container */
        .section-icon {
            width: 50px;
            height: 50px;
            background: rgba(248, 113, 113, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-accent);
            flex-shrink: 0;
        }

        .section-icon svg {
            width: 24px;
            height: 24px;
        }

        /* Typography */
        .section-content {
            flex-grow: 1;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            letter-spacing: -0.01em;
        }

        .section-description {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-muted);
        }
        
        .highlight-count {
            font-weight: 600;
            color: var(--text-main);
        }

        /* Action Buttons */
        .section-actions {
            display: flex;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .section-actions {
                width: 100%;
                margin-top: 0.5rem;
            }
            .btn {
                flex: 1;
            }
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            border: none;
            outline: none;
            font-family: inherit;
        }

        /* Secondary Action: Sleek Ghost/Outline */
        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1.5px solid var(--secondary-border);
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            background-color: var(--secondary-hover-bg);
        }

        /* Primary Action: Solid Soft Accent */
        .btn-primary {
            background-color: var(--primary-accent);
            color: white;
            box-shadow: 0 4px 14px 0 var(--primary-accent-shadow);
        }

        .btn-primary:hover {
            background-color: var(--primary-accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px 0 var(--primary-accent-shadow);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }
        
        /* Dashboard content placeholders */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        
        .dashboard-card {
            background: white;
            border: 1px solid var(--secondary-border);
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 150px;
        }
    </style>
</head>
<body>

    <!-- Fake Dashboard Content -->
    <div class="dashboard">
        <h1 style="margin-bottom: 0.5rem;">Employee Dashboard</h1>
        <p style="margin-bottom: 2rem; color: var(--text-muted);">Welcome back. Here's a look at your workspace.</p>
        
        <!-- The GDPR Section (Integrated smoothly into layout) -->
        <div class="gdpr-section" id="gdprSection">
            
            <!-- Soft Document Icon -->
            <div class="section-icon">
                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path>
                </svg>
            </div>

            <div class="section-content">
                <h2 class="section-title">Action Required</h2>
                <p class="section-description">
                    Attention: <span class="highlight-count" id="fileCount">3</span> files in your workspace require immediate action regarding GDPR data retention.
                </p>
            </div>

            <div class="section-actions">
                <button class="btn btn-secondary" onclick="viewFiles()">View Files</button>
                <button class="btn btn-primary" onclick="purgeFiles()">Purge Immediately</button>
            </div>

        </div>
        
        <div class="dashboard-grid">
            <div class="dashboard-card"></div>
            <div class="dashboard-card"></div>
            <div class="dashboard-card"></div>
        </div>

    </div>

    <script>
        // Basic State Management
        const gdprState = {
            violatingFilesCount: 3 // Dynamically driven by backend
        };

        const gdprSection = document.getElementById('gdprSection');
        const fileCountSpan = document.getElementById('fileCount');

        // Action: View Files
        function viewFiles() {
            console.log("Navigating to file review...");
            // In a real app, you would route to the violating files list here
        }

        // Action: Purge Immediately
        function purgeFiles() {
            console.log("Initiating file purge...");
            
            const primaryBtn = document.querySelector('.btn-primary');
            
            // Visual feedback: Loading state
            primaryBtn.textContent = "Purging...";
            primaryBtn.style.opacity = "0.7";
            primaryBtn.style.pointerEvents = "none";

            // Simulate API Request to purge files (e.g. 1.2s delay)
            setTimeout(() => {
                gdprState.violatingFilesCount = 0; // Update compliance status
                
                // Animate removal of the section since count is 0
                gdprSection.style.opacity = '0';
                
                setTimeout(() => {
                    gdprSection.style.display = 'none';
                }, 400); // Wait for fade out
                
                console.log("Files successfully purged. Compliance status updated.");
            }, 1200); 
        }

        // Initialize display if there are violating files
        window.onload = () => {
            fileCountSpan.textContent = gdprState.violatingFilesCount;
            if (gdprState.violatingFilesCount === 0) {
                gdprSection.style.display = 'none';
            }
        };
    </script>
</body>
</html>
