<style>
    /* Soft accent color (Warm Coral) */
    :root {
        --card-bg: rgba(255, 255, 255, 0.85);
        --primary-accent: #f87171; 
        --primary-accent-hover: #ef4444;
        --primary-accent-shadow: rgba(248, 113, 113, 0.35);
        --secondary-border: #cbd5e1;
        --secondary-hover-bg: #f1f5f9;
        --card-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -1px rgba(15, 23, 42, 0.03);
        --card-blur: 16px;
    }

    /* --- GDPR Section (Inline Dashboard Widget) --- */
    .gdpr-section {
        background: var(--card-bg);
        backdrop-filter: blur(var(--card-blur));
        -webkit-backdrop-filter: blur(var(--card-blur));
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        width: 100%;
        margin: 0 0 40px 0;
        padding: 1.5rem 2rem;
        box-shadow: var(--card-shadow);
        display: none; /* Hidden by default */
        align-items: center;
        gap: 1.5rem;
        transition: opacity 0.4s ease;
        opacity: 0;
    }

    @media (max-width: 768px) {
        .gdpr-section {
            flex-direction: column;
            align-items: flex-start;
            padding: 1.5rem;
        }
    }

    /* Soft Icon/Graphic Container */
    .section-icon {
        width: 50px;
        height: 50px;
        background: rgba(248, 113, 113, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary-accent);
        flex-shrink: 0;
    }

    .section-icon svg {
        width: 24px;
        height: 24px;
    }

    /* Typography */
    .section-content {
        flex-grow: 1;
    }

    .section-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
        letter-spacing: -0.01em;
        color: var(--text-primary);
    }

    .section-description {
        font-size: 0.95rem;
        line-height: 1.5;
        color: var(--text-muted);
    }
    
    .highlight-count {
        font-weight: 600;
        color: var(--text-primary);
    }

    /* Action Buttons */
    .section-actions {
        display: flex;
        gap: 0.75rem;
        flex-shrink: 0;
    }

    @media (max-width: 768px) {
        .section-actions {
            width: 100%;
            margin-top: 0.5rem;
        }
        .section-btn {
            flex: 1;
        }
    }

    .section-btn {
        padding: 0.6rem 1.25rem;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s ease;
        text-align: center;
        border: none;
        outline: none;
        font-family: inherit;
    }

    /* Secondary Action: Sleek Ghost/Outline */
    .btn-secondary {
        background-color: transparent;
        color: var(--text-primary);
        border: 1.5px solid var(--secondary-border);
    }

    .btn-secondary:hover {
        border-color: var(--text-muted);
        background-color: var(--secondary-hover-bg);
    }

    /* Primary Action: Solid Soft Accent */
    .btn-primary {
        background-color: var(--primary-accent);
        color: white;
        box-shadow: 0 4px 14px 0 var(--primary-accent-shadow);
    }

    .btn-primary:hover {
        background-color: var(--primary-accent-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px 0 var(--primary-accent-shadow);
    }

    .btn-primary:active {
        transform: translateY(1px);
    }
</style>

<!-- The GDPR Section (Integrated smoothly into layout) -->
<div class="gdpr-section" id="gdprSection">
    
    <!-- Soft Document Icon -->
    <div class="section-icon">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path>
        </svg>
    </div>

    <div class="section-content">
        <h2 class="section-title">Action Required</h2>
        <p class="section-description">
            Attention: <span class="highlight-count" id="fileCount">0</span> files in your workspace require immediate action regarding GDPR data retention.
        </p>
    </div>

    <div class="section-actions">
        <button class="section-btn btn-secondary" onclick="viewFiles()">View Files</button>
        <button class="section-btn btn-primary" onclick="purgeFiles()">Purge Immediately</button>
    </div>

</div>

<script>
    // Basic State Management
    const gdprState = {
        violatingFilesCount: 0,
        violatingFiles: [],
        employeeId: null
    };

    const gdprSection = document.getElementById('gdprSection');
    const fileCountSpan = document.getElementById('fileCount');

    // Trigger Modal function is re-purposed to show the inline section
    function triggerGdprModal(employeeId, violatingFiles) {
        if (!violatingFiles || violatingFiles.length === 0) return;
        gdprState.employeeId = employeeId;
        gdprState.violatingFiles = violatingFiles;
        gdprState.violatingFilesCount = violatingFiles.length;
        
        fileCountSpan.textContent = gdprState.violatingFilesCount;
        
        gdprSection.style.display = 'flex';
        // force reflow
        void gdprSection.offsetWidth;
        gdprSection.style.opacity = '1';
    }

    // Action: View Files
    function viewFiles() {
        console.log("Navigating to file review...");
        window.location.href = "/data-points?filter=delete";
    }

    // Action: Purge Immediately
    async function purgeFiles() {
        console.log("Initiating file purge...");
        
        const primaryBtn = gdprSection.querySelector('.btn-primary');
        const originalText = primaryBtn.textContent;
        
        // Visual feedback: Loading state
        primaryBtn.textContent = "Purging...";
        primaryBtn.style.opacity = "0.7";
        primaryBtn.style.pointerEvents = "none";

        try {
            // Bulk purge
            let hasErrors = false;
            let errorDetail = "Unknown error";
            for (const file of gdprState.violatingFiles) {
                const response = await fetch(`/api/employee/files/${file.file_id}/delete-expired`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_id: gdprState.employeeId })
                });
                
                if (!response.ok) {
                    hasErrors = true;
                    try {
                        const data = await response.json();
                        if (data) {
                            if (typeof data.detail === 'string') errorDetail = data.detail;
                            else if (Array.isArray(data.detail)) errorDetail = data.detail.map(err => err.msg).join(', ');
                            else if (data.message) errorDetail = data.message;
                        }
                    } catch (e) {}
                    break;
                }
            }
            
            if (hasErrors) {
                alert("Failed to purge all files: " + errorDetail);
                primaryBtn.textContent = originalText;
                primaryBtn.style.opacity = "1";
                primaryBtn.style.pointerEvents = "auto";
                return;
            }
            
            gdprState.violatingFilesCount = 0; // Update compliance status
            
            // Hide section
            gdprSection.style.opacity = '0';
            setTimeout(() => {
                gdprSection.style.display = 'none';
            }, 400);
            
            // Refresh dashboard
            setTimeout(() => {
                window.location.reload();
            }, 500);
        } catch (err) {
            console.error(err);
            alert("Failed to purge all files due to connection error: " + err.message);
            primaryBtn.textContent = originalText;
            primaryBtn.style.opacity = "1";
            primaryBtn.style.pointerEvents = "auto";
        }
    }
</script>
